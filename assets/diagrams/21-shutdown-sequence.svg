<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 356" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="44" width="860" height="120" rx="12" fill="#f5f8fc" stroke="#ddd"/>
<text x="32" y="64" font-size="12" font-weight="700" fill="#1d1d1d">Kubernetes</text>
<rect x="20" y="188" width="860" height="120" rx="12" fill="#fffaf3" stroke="#ddd"/>
<text x="32" y="208" font-size="12" font-weight="700" fill="#1d1d1d">Your pod</text>
<rect x="40" y="78" width="180" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="130.0" y="111.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SIGTERM → PID 1</text>
<rect x="253" y="78" width="180" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="343.0" y="104.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">grace clock starts</text>
<text x="343.0" y="121.0" font-size="11.5" fill="#555555" text-anchor="middle">default 30s</text>
<rect x="466" y="78" width="180" height="56" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="556.0" y="104.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">endpoint removal</text>
<text x="556.0" y="121.0" font-size="11.5" fill="#555555" text-anchor="middle">(asynchronous)</text>
<rect x="680" y="78" width="180" height="56" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="770.0" y="104.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SIGKILL</text>
<text x="770.0" y="121.0" font-size="11.5" fill="#555555" text-anchor="middle">if you overrun</text>
<rect x="40" y="222" width="180" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="130.0" y="248.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">readiness DOWN</text>
<text x="130.0" y="265.0" font-size="11.5" fill="#555555" text-anchor="middle">stop new traffic</text>
<rect x="253" y="222" width="180" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="343.0" y="248.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">preStop sleep ~5s</text>
<text x="343.0" y="265.0" font-size="11.5" fill="#555555" text-anchor="middle">cover dereg lag</text>
<rect x="466" y="222" width="180" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="556.0" y="248.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">drain HTTP + Kafka</text>
<text x="556.0" y="265.0" font-size="11.5" fill="#555555" text-anchor="middle">sockets, pools</text>
<rect x="680" y="222" width="180" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="770.0" y="248.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">exit cleanly</text>
<text x="770.0" y="265.0" font-size="11.5" fill="#555555" text-anchor="middle">before grace ends</text>
<path d="M130,134 L130,222" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="164.0" y="180.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">triggers</text>
<text x="164.0" y="180.0" font-size="11" fill="#555" text-anchor="middle">triggers</text>
<text x="450" y="180" font-size="11" fill="#8a4b06" text-anchor="middle">readiness DOWN + preStop keep new traffic off the dying pod during the async-removal race</text>
<text x="450" y="330" font-size="11" fill="#2f6db5" text-anchor="middle">liveness must stay UP throughout — or the kubelet restarts a pod that is intentionally draining</text>
<text x="860" y="330" font-size="10" fill="#888888" text-anchor="end">time →</text>
</svg>