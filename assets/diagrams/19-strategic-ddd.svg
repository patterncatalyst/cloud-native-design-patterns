<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 470" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="75" width="350" height="175" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="215.0" y="138.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Core subdomain</text>
<text x="215.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">your competitive edge</text>
<text x="215.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">complex + volatile</text>
<text x="215.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">your best people</text>
<text x="215.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">e.g. order, pricing</text>
<rect x="415" y="75" width="350" height="175" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="590.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Supporting subdomain</text>
<text x="590.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">necessary, not a differentiator</text>
<text x="590.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">build it simply</text>
<text x="590.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">e.g. inventory, shipping</text>
<rect x="790" y="75" width="350" height="175" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="965.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Generic subdomain</text>
<text x="965.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">a solved problem</text>
<text x="965.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">buy / adopt off-the-shelf</text>
<text x="965.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">e.g. auth, notification</text>
<rect x="40" y="278" width="1100" height="54" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="590.0" y="310.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">each subdomain becomes one or more bounded contexts — a model boundary with its own ubiquitous language</text>
<rect x="40" y="348" width="1100" height="68" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="590.0" y="380.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">the API is that boundary — one context&#x27;s &quot;order&quot; is not another&#x27;s</text>
<text x="590.0" y="397.0" font-size="11.5" fill="#555555" text-anchor="middle">the contract translates between models; it never shares internals</text>
<text x="590" y="450" font-size="12" fill="#2f6db5" text-anchor="middle">a bounded context owns one model and one ubiquitous language — and exposes it to others through an API</text>
</svg>