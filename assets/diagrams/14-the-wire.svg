<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 330" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="370" height="235" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="205.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">REST</text>
<text x="205.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="205.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">transport: HTTP/1.1 or /2</text>
<text x="205.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">encoding: JSON (text)</text>
<text x="205.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">interaction: request / response</text>
<text x="205.0" y="195.0" font-size="11.5" fill="#555555" text-anchor="middle">caching: via HTTP</text>
<text x="205.0" y="210.0" font-size="11.5" fill="#555555" text-anchor="middle">reach: browser-native</text>
<rect x="405" y="40" width="370" height="235" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="590.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">gRPC</text>
<text x="590.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="590.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">transport: HTTP/2 only</text>
<text x="590.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">encoding: protobuf (binary)</text>
<text x="590.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">interaction: uni + bidi streaming</text>
<text x="590.0" y="195.0" font-size="11.5" fill="#555555" text-anchor="middle">caching: none (no HTTP cache)</text>
<text x="590.0" y="210.0" font-size="11.5" fill="#555555" text-anchor="middle">reach: needs grpc-web in browser</text>
<rect x="790" y="40" width="370" height="235" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="975.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">GraphQL</text>
<text x="975.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="975.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">transport: HTTP POST (one URL)</text>
<text x="975.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">encoding: JSON (text)</text>
<text x="975.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">interaction: req/resp + subscriptions</text>
<text x="975.0" y="195.0" font-size="11.5" fill="#555555" text-anchor="middle">caching: app-level</text>
<text x="975.0" y="210.0" font-size="11.5" fill="#555555" text-anchor="middle">reach: browser-native</text>
<text x="590" y="305" font-size="12" fill="#2f6db5" text-anchor="middle">pick on the wire properties you need: reach and caching, raw speed, or client-shaped responses</text>
</svg>