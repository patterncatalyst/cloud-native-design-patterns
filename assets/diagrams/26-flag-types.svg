<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="70" y="70" width="360" height="150" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="250.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Release flag  ·  dev-owned</text>
<text x="250.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">ship dark, ramp %, then REMOVE</text>
<text x="250.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">the temporary on/off for new code</text>
<text x="250.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">→ progressive delivery</text>
<rect x="450" y="70" width="360" height="150" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="630.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Experiment / A-B  ·  data-owned</text>
<text x="630.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">split variants, measure the metric</text>
<text x="630.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">temporary — ends when the test ends</text>
<text x="630.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">→ sticky bucketing required</text>
<rect x="70" y="240" width="360" height="150" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="250.0" y="298.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Ops / kill-switch  ·  SRE-owned</text>
<text x="250.0" y="315.0" font-size="11.5" fill="#555555" text-anchor="middle">disable a feature or dependency FAST</text>
<text x="250.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">long-lived — a permanent control</text>
<text x="250.0" y="345.0" font-size="11.5" fill="#555555" text-anchor="middle">→ pairs with circuit breakers</text>
<rect x="450" y="240" width="360" height="150" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="630.0" y="298.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Permission / entitlement  ·  product</text>
<text x="630.0" y="315.0" font-size="11.5" fill="#555555" text-anchor="middle">gate by plan, tier, or region</text>
<text x="630.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">long-lived — part of the product model</text>
<text x="630.0" y="345.0" font-size="11.5" fill="#555555" text-anchor="middle">→ targeting rules, not a rollout</text>
<text x="430" y="40" font-size="12" fill="#333" text-anchor="middle" font-weight="700">short-lived  ←  lifetime  →  long-lived</text>
<text x="24" y="230" font-size="12" fill="#333" text-anchor="middle" font-weight="700">who flips it</text>
</svg>