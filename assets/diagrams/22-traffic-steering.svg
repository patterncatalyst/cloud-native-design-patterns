<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 410" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="70" width="340" height="120" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="210.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Canary</text>
<text x="210.0" y="137.5" font-size="11.5" fill="#555555" text-anchor="middle">90% v1, 10% v2</text>
<text x="210.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">watch metrics; ramp</text>
<rect x="420" y="70" width="340" height="120" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="590.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Blue / Green</text>
<text x="590.0" y="137.5" font-size="11.5" fill="#555555" text-anchor="middle">all v1 → all v2</text>
<text x="590.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">flip atomically; fast rollback</text>
<rect x="800" y="70" width="340" height="120" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="970.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">A / B test</text>
<text x="970.0" y="137.5" font-size="11.5" fill="#555555" text-anchor="middle">cohort → variant</text>
<text x="970.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">stable per user; measure</text>
<rect x="40" y="210" width="340" height="120" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="210.0" y="260.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Header-based</text>
<text x="210.0" y="277.5" font-size="11.5" fill="#555555" text-anchor="middle">x-internal:1 → v2</text>
<text x="210.0" y="292.5" font-size="11.5" fill="#555555" text-anchor="middle">dark launches, betas</text>
<rect x="420" y="210" width="340" height="120" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="590.0" y="260.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Geo / latency</text>
<text x="590.0" y="277.5" font-size="11.5" fill="#555555" text-anchor="middle">EU users → EU pods</text>
<text x="590.0" y="292.5" font-size="11.5" fill="#555555" text-anchor="middle">lower RTT, data residency</text>
<rect x="800" y="210" width="340" height="120" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="970.0" y="260.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Shadow</text>
<text x="970.0" y="277.5" font-size="11.5" fill="#555555" text-anchor="middle">copy traffic to v2</text>
<text x="970.0" y="292.5" font-size="11.5" fill="#555555" text-anchor="middle">test under load, no user impact</text>
<text x="590" y="390" font-size="12" fill="#2f6db5" text-anchor="middle">each pattern is a header/weight rule away — the value is in the deploy and rollback discipline around them</text>
</svg>