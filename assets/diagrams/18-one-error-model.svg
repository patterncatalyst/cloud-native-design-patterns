<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 450" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="290" y="45" width="600" height="175" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="590.0" y="100.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Every error carries</text>
<text x="590.0" y="117.5" font-size="11.5" fill="#555555" text-anchor="middle">stable machine code (e.g. STOCK_UNAVAILABLE)</text>
<text x="590.0" y="132.5" font-size="11.5" fill="#555555" text-anchor="middle">human-readable message (safe to show)</text>
<text x="590.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle">correlation / trace id (ties to the trace)</text>
<text x="590.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">retryable? + retry-after when known</text>
<text x="590.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">field-level details (what was wrong)</text>
<rect x="20" y="300" width="270" height="110" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="155.0" y="345.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">REST</text>
<text x="155.0" y="362.5" font-size="11.5" fill="#555555" text-anchor="middle">application/problem+json</text>
<text x="155.0" y="377.5" font-size="11.5" fill="#555555" text-anchor="middle">(RFC 9457)</text>
<rect x="300" y="300" width="270" height="110" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="435.0" y="345.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">gRPC</text>
<text x="435.0" y="362.5" font-size="11.5" fill="#555555" text-anchor="middle">status code +</text>
<text x="435.0" y="377.5" font-size="11.5" fill="#555555" text-anchor="middle">google.rpc.Status details</text>
<rect x="580" y="300" width="270" height="110" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="715.0" y="345.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Kafka</text>
<text x="715.0" y="362.5" font-size="11.5" fill="#555555" text-anchor="middle">headers +</text>
<text x="715.0" y="377.5" font-size="11.5" fill="#555555" text-anchor="middle">dead-letter record</text>
<rect x="860" y="300" width="270" height="110" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="995.0" y="345.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">GraphQL</text>
<text x="995.0" y="362.5" font-size="11.5" fill="#555555" text-anchor="middle">errors[] + extensions</text>
<text x="995.0" y="377.5" font-size="11.5" fill="#555555" text-anchor="middle">.code</text>
<path d="M450,220 L155,300" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M540,220 L435,300" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M640,220 L715,300" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M730,220 L995,300" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="590" y="438" font-size="12" fill="#2f6db5" text-anchor="middle">agree the error contract once, then map it onto each protocol — and never leak stack traces or internal types</text>
</svg>