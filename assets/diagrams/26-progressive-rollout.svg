<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="118" width="150" height="64" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="115.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">userId</text>
<text x="115.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">(stable key)</text>
<rect x="250" y="118" width="160" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="330.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">hash(userId)</text>
<text x="330.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">→ bucket 0–99</text>
<rect x="470" y="118" width="180" height="64" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="560.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">bucket &lt; rollout%?</text>
<text x="560.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">threshold: 5 → 25 → 100</text>
<rect x="710" y="78" width="170" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="795.0" y="108.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">bucket &lt; N → new</text>
<rect x="710" y="160" width="170" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="795.0" y="190.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">else → old</text>
<path d="M190,150 L250,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M410,150 L470,150" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M650,140 L710,103" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M650,160 L710,185" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="460" y="244" font-size="11" fill="#333" text-anchor="middle" font-weight="700">the same user always lands in the same bucket → consistent assignment: no flicker between variants on repeat visits</text>
<text x="460" y="268" font-size="11" fill="#2f6db5" text-anchor="middle">widening the threshold ramps the rollout; narrowing it rolls back — instantly, without a deploy</text>
</svg>