<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="60" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="160.0" y="104.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">01  Codebase</text>
<text x="160.0" y="121.0" font-size="11.5" fill="#555555" text-anchor="middle">one repo, many deploys</text>
<rect x="320" y="60" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="460.0" y="104.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">02  Dependencies</text>
<text x="460.0" y="121.0" font-size="11.5" fill="#555555" text-anchor="middle">declare and isolate them</text>
<rect x="620" y="60" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="760.0" y="104.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">03  Config</text>
<text x="760.0" y="121.0" font-size="11.5" fill="#555555" text-anchor="middle">read from the environment</text>
<rect x="20" y="168" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="160.0" y="212.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">04  Backing services</text>
<text x="160.0" y="229.0" font-size="11.5" fill="#555555" text-anchor="middle">treat as attached resources</text>
<rect x="320" y="168" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="460.0" y="212.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">05  Build, release, run</text>
<text x="460.0" y="229.0" font-size="11.5" fill="#555555" text-anchor="middle">keep the stages separate</text>
<rect x="620" y="168" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="760.0" y="212.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">06  Processes</text>
<text x="760.0" y="229.0" font-size="11.5" fill="#555555" text-anchor="middle">stateless, share-nothing</text>
<rect x="20" y="276" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="160.0" y="320.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">07  Port binding</text>
<text x="160.0" y="337.0" font-size="11.5" fill="#555555" text-anchor="middle">export a service via a port</text>
<rect x="320" y="276" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="460.0" y="320.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">08  Concurrency</text>
<text x="460.0" y="337.0" font-size="11.5" fill="#555555" text-anchor="middle">scale out with processes</text>
<rect x="620" y="276" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="760.0" y="320.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">09  Disposability</text>
<text x="760.0" y="337.0" font-size="11.5" fill="#555555" text-anchor="middle">fast start, graceful stop</text>
<rect x="20" y="384" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="160.0" y="428.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">10  Dev / prod parity</text>
<text x="160.0" y="445.0" font-size="11.5" fill="#555555" text-anchor="middle">keep environments alike</text>
<rect x="320" y="384" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="460.0" y="428.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">11  Logs</text>
<text x="460.0" y="445.0" font-size="11.5" fill="#555555" text-anchor="middle">treat as event streams</text>
<rect x="620" y="384" width="280" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="760.0" y="428.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">12  Admin processes</text>
<text x="760.0" y="445.0" font-size="11.5" fill="#555555" text-anchor="middle">run as one-off tasks</text>
<text x="460" y="516" font-size="12" fill="#8a4b06" text-anchor="middle">don&#x27;t memorise the list — recognise that most are now platform concerns, and only a few are yours to write</text>
</svg>