<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 380" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="70" width="450" height="80" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="265.0" y="108.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">4xx — client error</text>
<text x="265.0" y="125.0" font-size="11.5" fill="#555555" text-anchor="middle">fix the request; do NOT retry as-is</text>
<rect x="40" y="166" width="450" height="80" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="265.0" y="204.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">429 / 503 — busy</text>
<text x="265.0" y="221.0" font-size="11.5" fill="#555555" text-anchor="middle">back off; honour the Retry-After header</text>
<rect x="40" y="262" width="450" height="80" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="265.0" y="300.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">5xx — server error</text>
<text x="265.0" y="317.0" font-size="11.5" fill="#555555" text-anchor="middle">retry idempotent calls with backoff</text>
<rect x="560" y="70" width="580" height="272" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="850.0" y="166.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">application/problem+json · RFC 9457</text>
<text x="850.0" y="183.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="850.0" y="198.5" font-size="11.5" fill="#555555" text-anchor="middle">type · title · status: 409</text>
<text x="850.0" y="213.5" font-size="11.5" fill="#555555" text-anchor="middle">detail: SKU-42 has 3 left, 5 requested</text>
<text x="850.0" y="228.5" font-size="11.5" fill="#555555" text-anchor="middle">instance: /orders/1037</text>
<text x="850.0" y="243.5" font-size="11.5" fill="#555555" text-anchor="middle">code: STOCK_UNAVAILABLE   (machine)</text>
<text x="850.0" y="258.5" font-size="11.5" fill="#555555" text-anchor="middle">traceId: 4af9c…   (correlate)</text>
<text x="265" y="58" font-size="12" fill="#2f6db5" text-anchor="middle" font-weight="700">Choose the status class first</text>
<text x="590" y="368" font-size="12" fill="#2f6db5" text-anchor="middle">pick the right status class, add Retry-After on 429/503, and put the machine code in a problem+json body</text>
</svg>