<path d="M760,305 L520,355" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="646.0" y="324.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">4. validate</text>
