<text x="600" y="438" font-size="12" fill="#2f6db5" text-anchor="middle">the app never proxies the bytes — no long-lived credentials at the client (S3 pre-signed URLs, Azure SAS tokens, GCS signed URLs, STS AssumeRole)</text>
