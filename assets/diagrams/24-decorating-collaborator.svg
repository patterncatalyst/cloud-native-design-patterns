<text x="590" y="392" font-size="12" fill="#2e7d32" text-anchor="middle">clients now talk to the decorator; the legacy service keeps running and is eventually replaced behind the decorator&#x27;s API — unlike a plain proxy, the decorator owns behaviour, not just routing</text>
