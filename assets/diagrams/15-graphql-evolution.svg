<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 290" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="70" width="250" height="135" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="165.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Add</text>
<text x="165.0" y="137.5" font-size="11.5" fill="#555555" text-anchor="middle">new field / type</text>
<text x="165.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">additive = safe</text>
<text x="165.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">clients opt in</text>
<rect x="330" y="70" width="250" height="135" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="455.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">@deprecated</text>
<text x="455.0" y="137.5" font-size="11.5" fill="#555555" text-anchor="middle">mark old field</text>
<text x="455.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">reason + replacement</text>
<text x="455.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">still served</text>
<rect x="620" y="70" width="250" height="135" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="745.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Watch usage</text>
<text x="745.0" y="137.5" font-size="11.5" fill="#555555" text-anchor="middle">field-level metrics</text>
<text x="745.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">who still queries it</text>
<text x="745.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">drive migration</text>
<rect x="910" y="70" width="250" height="135" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="1035.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Retire</text>
<text x="1035.0" y="137.5" font-size="11.5" fill="#555555" text-anchor="middle">zero usage</text>
<text x="1035.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">remove the field</text>
<text x="1035.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">only breaking step</text>
<path d="M290,137 L330,137" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M580,137 L620,137" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M870,137 L910,137" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="590" y="265" font-size="12" fill="#2f6db5" text-anchor="middle">there is no /v2 in GraphQL: add fields, mark old ones @deprecated, watch usage, then retire</text>
