<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="150" y="104" width="470" height="92" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="162" y="124" font-size="12" font-weight="700" fill="#1d1d1d">WebSocket binary frame (opcode 0x2)</text>
<rect x="20" y="132" width="110" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="75.0" y="158.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Producer</text>
<text x="75.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">encode → bytes</text>
<rect x="166" y="140" width="86" height="46" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="209.0" y="161.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">version</text>
<text x="209.0" y="178.0" font-size="11.5" fill="#555555" text-anchor="middle">uint32 = 2</text>
<rect x="260" y="140" width="96" height="46" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="308.0" y="161.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">seq</text>
<text x="308.0" y="178.0" font-size="11.5" fill="#555555" text-anchor="middle">uint64 = 1043</text>
<rect x="364" y="140" width="110" height="46" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="419.0" y="161.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">type</text>
<text x="419.0" y="178.0" font-size="11.5" fill="#555555" text-anchor="middle">&quot;OrderPlaced&quot;</text>
<rect x="482" y="140" width="120" height="46" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="542.0" y="161.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">payload</text>
<text x="542.0" y="178.0" font-size="11.5" fill="#555555" text-anchor="middle">protobuf bytes</text>
<rect x="640" y="132" width="110" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="695.0" y="158.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Consumer</text>
<text x="695.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">decode → dispatch</text>
<path d="M130,160 L150,160" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M620,160 L640,160" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="380" y="228" font-size="11" fill="#777" text-anchor="middle">versioned by field number (like gRPC) — add fields, never renumber</text>
