<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="60" y="110" width="330" height="240" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="225.0" y="175.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Shared pool / shared thread group</text>
<text x="225.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="225.0" y="207.5" font-size="11.5" fill="#555555" text-anchor="middle">customer A traffic</text>
<text x="225.0" y="222.5" font-size="11.5" fill="#555555" text-anchor="middle">customer B traffic</text>
<text x="225.0" y="237.5" font-size="11.5" fill="#555555" text-anchor="middle">background jobs</text>
<text x="225.0" y="252.5" font-size="11.5" fill="#555555" text-anchor="middle">scheduled work</text>
<text x="225.0" y="267.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="225.0" y="282.5" font-size="11.5" fill="#555555" text-anchor="middle">one client storm → everyone</text>
<text x="225.0" y="297.5" font-size="11.5" fill="#555555" text-anchor="middle">starves / times out / fails</text>
<rect x="560" y="110" width="250" height="72" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="685.0" y="144.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Customer A</text>
<text x="685.0" y="161.0" font-size="11.5" fill="#555555" text-anchor="middle">own pool: 50 conn · 20 threads</text>
<rect x="560" y="196" width="250" height="72" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="685.0" y="230.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Customer B</text>
<text x="685.0" y="247.0" font-size="11.5" fill="#555555" text-anchor="middle">own pool: 50 conn · 20 threads</text>
<rect x="560" y="282" width="250" height="72" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="685.0" y="316.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Background</text>
<text x="685.0" y="333.0" font-size="11.5" fill="#555555" text-anchor="middle">own pool: 20 conn · 8 threads</text>
<rect x="840" y="110" width="300" height="244" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="990.0" y="200.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Effect</text>
<text x="990.0" y="217.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="990.0" y="232.0" font-size="11.5" fill="#555555" text-anchor="middle">A&#x27;s storm → only A fails</text>
<text x="990.0" y="247.0" font-size="11.5" fill="#555555" text-anchor="middle">B and background keep working</text>
<text x="990.0" y="262.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="990.0" y="277.0" font-size="11.5" fill="#555555" text-anchor="middle">blast radius bounded</text>
<text x="225" y="96" font-size="12" fill="#9b1c1c" text-anchor="middle" font-weight="700">Without bulkheads</text>
<text x="690" y="96" font-size="12" fill="#006e6e" text-anchor="middle" font-weight="700">With bulkheads</text>
<text x="600" y="402" font-size="12" fill="#2f6db5" text-anchor="middle">watertight compartments from naval architecture — per-tenant connection pools, per-call thread groups, semaphore-bounded operations (Resilience4j, Polly, Istio per-destination pools)</text>
</svg>