<text x="345.0" y="326.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Orders DB</text>
<text x="345.0" y="343.5" font-size="11.5" fill="#555555" text-anchor="middle">own Postgres</text>
<text x="345.0" y="358.5" font-size="11.5" fill="#555555" text-anchor="middle">own schema · own pool</text>
<rect x="480" y="290" width="230" height="92" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="595.0" y="326.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Inventory DB</text>
<text x="595.0" y="343.5" font-size="11.5" fill="#555555" text-anchor="middle">own Postgres / Mongo</text>
<text x="595.0" y="358.5" font-size="11.5" fill="#555555" text-anchor="middle">own schema · own pool</text>
<rect x="730" y="290" width="230" height="92" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="845.0" y="326.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Payments DB</text>
<text x="845.0" y="343.5" font-size="11.5" fill="#555555" text-anchor="middle">own Postgres</text>
<text x="845.0" y="358.5" font-size="11.5" fill="#555555" text-anchor="middle">encrypted at rest · PII boundary</text>
<path d="M345,182 L345,290" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M595,182 L595,290" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M845,182 L845,290" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="590" y="408" font-size="12" fill="#2e7d32" text-anchor="middle">cross-module data is now async / event-driven — the same discipline as microservices, without the operational cost</text>
<text x="590" y="430" font-size="12" fill="#555" text-anchor="middle">promoting one module to a process is now a deployment change, not a data-migration project</text>
