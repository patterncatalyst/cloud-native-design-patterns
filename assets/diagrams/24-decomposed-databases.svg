<text x="595.0" y="141.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Inventory module</text>
<rect x="730" y="90" width="230" height="92" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="845.0" y="141.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Payments module</text>
