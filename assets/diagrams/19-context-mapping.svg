<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 470" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="70" width="280" height="140" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="160.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Open-Host Service ★</text>
<text x="160.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="160.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">publish a stable API for all comers</text>
<rect x="310" y="70" width="280" height="140" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="450.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Published Language ★</text>
<text x="450.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="450.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">a shared schema: OpenAPI / proto / Avro</text>
<rect x="600" y="70" width="280" height="140" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="740.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Anticorruption Layer ★</text>
<text x="740.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="740.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">translate a foreign model at your edge</text>
<rect x="890" y="70" width="280" height="140" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="1030.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Conformist</text>
<text x="1030.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="1030.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">accept the upstream model as-is</text>
<rect x="20" y="232" width="280" height="140" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="160.0" y="292.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Customer / Supplier</text>
<text x="160.0" y="309.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="160.0" y="324.5" font-size="11.5" fill="#555555" text-anchor="middle">upstream serves a negotiated downstream</text>
<rect x="310" y="232" width="280" height="140" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="450.0" y="292.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Shared Kernel</text>
<text x="450.0" y="309.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="450.0" y="324.5" font-size="11.5" fill="#555555" text-anchor="middle">share a model — high coupling, sparingly</text>
<rect x="600" y="232" width="280" height="140" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="740.0" y="292.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Partnership</text>
<text x="740.0" y="309.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="740.0" y="324.5" font-size="11.5" fill="#555555" text-anchor="middle">two contexts evolve together</text>
<rect x="890" y="232" width="280" height="140" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="1030.0" y="292.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Separate Ways</text>
<text x="1030.0" y="309.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="1030.0" y="324.5" font-size="11.5" fill="#555555" text-anchor="middle">don&#x27;t integrate at all</text>
<text x="590" y="408" font-size="12" fill="#2f6db5" text-anchor="middle">★ the API-relevant patterns: expose an Open-Host Service with a Published Language; wrap inbound dependencies in an anticorruption layer</text>
<text x="590" y="438" font-size="12" fill="#555" text-anchor="middle">a published API is an Open-Host Service; an anticorruption layer keeps a foreign model out of yours</text>
</svg>