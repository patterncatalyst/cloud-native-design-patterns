<rect x="40" y="92" width="170" height="58" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="125.0" y="119.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Create</text>
