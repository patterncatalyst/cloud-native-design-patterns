<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="60" width="440" height="250" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="260.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Event SOURCING — events ARE the state</text>
<text x="260.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="260.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">aggregate state = fold(events from t0)</text>
<text x="260.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">the event log IS the database</text>
<text x="260.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">every change is a new appended event</text>
<text x="260.0" y="207.5" font-size="11.5" fill="#555555" text-anchor="middle">current state rebuilt by replaying</text>
<text x="260.0" y="222.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="260.0" y="237.5" font-size="11.5" fill="#555555" text-anchor="middle">fit: audit-heavy, financial, temporal queries</text>
<text x="260.0" y="252.5" font-size="11.5" fill="#555555" text-anchor="middle">where: Marten · EventStoreDB · Axon</text>
<rect x="520" y="60" width="440" height="250" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="740.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Event STREAMING — events are the TRANSPORT</text>
<text x="740.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="740.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">current state lives in a database</text>
<text x="740.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">events are facts emitted ABOUT changes</text>
<text x="740.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">consumers react and propagate</text>
<text x="740.0" y="207.5" font-size="11.5" fill="#555555" text-anchor="middle">no aggregate replay, just propagation</text>
<text x="740.0" y="222.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="740.0" y="237.5" font-size="11.5" fill="#555555" text-anchor="middle">fit: integration, fan-out, decoupling teams</text>
<text x="740.0" y="252.5" font-size="11.5" fill="#555555" text-anchor="middle">where: Kafka · Pulsar · NATS JetStream</text>
<text x="500" y="340" font-size="12" fill="#333" text-anchor="middle" font-weight="700">not mutually exclusive — full CQRS often does both: an event-sourced write side, stream-fed read projections</text>
<text x="500" y="366" font-size="12" fill="#2f6db5" text-anchor="middle">ask: is the EVENT itself the source of truth (sourcing), or a fact PROPAGATED from a store (streaming)?</text>
</svg>