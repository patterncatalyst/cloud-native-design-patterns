<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 392" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="860" height="168" rx="12" fill="#fffaf3" stroke="#ddd"/>
<text x="32" y="60" font-size="12" font-weight="700" fill="#1d1d1d">The storm — a positive feedback loop</text>
<rect x="20" y="236" width="860" height="132" rx="12" fill="#f5f8fc" stroke="#ddd"/>
<text x="32" y="256" font-size="12" font-weight="700" fill="#1d1d1d">The controls that break the loop</text>
<rect x="70" y="104" width="168" height="70" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="154.0" y="137.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Clients</text>
<text x="154.0" y="154.0" font-size="11.5" fill="#555555" text-anchor="middle">retry on timeout</text>
<rect x="662" y="104" width="178" height="70" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="751.0" y="137.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Order service</text>
<text x="751.0" y="154.0" font-size="11.5" fill="#555555" text-anchor="middle">already struggling</text>
<rect x="40" y="284" width="124" height="62" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="102.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Timeout</text>
<text x="102.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">bound every call</text>
<rect x="180" y="284" width="124" height="62" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="242.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Bounded retries</text>
<text x="242.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">idempotent only</text>
<rect x="320" y="284" width="124" height="62" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="382.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Backoff + jitter</text>
<text x="382.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">no lockstep</text>
<rect x="460" y="284" width="124" height="62" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="522.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Circuit breaker</text>
<text x="522.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">fail fast</text>
<rect x="600" y="284" width="124" height="62" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="662.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Retry budget</text>
<text x="662.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">cap % of traffic</text>
<rect x="736" y="284" width="124" height="62" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="798.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Shed load</text>
<text x="798.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">429 / 503 early</text>
<path d="M238,124 L662,124" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="456.0" y="114.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">retries ×3 → 3× load</text>
<text x="456.0" y="114.0" font-size="11" fill="#b8650a" text-anchor="middle">retries ×3 → 3× load</text>
<path d="M662,156 L238,156" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="456.0" y="174.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">more timeouts</text>
<text x="456.0" y="174.0" font-size="11" fill="#b8650a" text-anchor="middle">more timeouts</text>
<text x="450" y="196" font-size="11" fill="#8a4b06" text-anchor="middle">each loop adds load to a service that is already failing</text>
<text x="450" y="360" font-size="11" fill="#2f6db5" text-anchor="middle">each control removes one multiplier from the loop — together they turn a blip back into a non-event</text>
</svg>