<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 366" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="44" width="860" height="128" rx="12" fill="#f5f8fc" stroke="#ddd"/>
<text x="32" y="64" font-size="12" font-weight="700" fill="#1d1d1d">North / south — a request is a chain of L7 decisions</text>
<rect x="20" y="212" width="860" height="120" rx="12" fill="#fffaf3" stroke="#ddd"/>
<text x="32" y="232" font-size="12" font-weight="700" fill="#1d1d1d">East / west — most L7 decisions happen here, between services, in the mesh</text>
<rect x="36" y="86" width="108" height="58" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="90.0" y="120.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Client</text>
<rect x="174" y="86" width="150" height="58" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="249.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Edge / ingress</text>
<text x="249.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">TLS · host/path</text>
<rect x="354" y="86" width="150" height="58" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="429.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">API gateway</text>
<text x="429.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">auth · rate limit</text>
<rect x="534" y="86" width="150" height="58" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="609.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Mesh sidecar</text>
<text x="609.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">mTLS · retries</text>
<rect x="714" y="86" width="150" height="58" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="789.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Service</text>
<text x="789.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">in-app rules</text>
<rect x="140" y="250" width="150" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="215.0" y="283.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Service A</text>
<rect x="375" y="250" width="150" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="450.0" y="276.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">mesh sidecars</text>
<text x="450.0" y="293.0" font-size="11.5" fill="#555555" text-anchor="middle">mTLS · outlier · locality</text>
<rect x="610" y="250" width="150" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="685.0" y="283.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Service B</text>
<path d="M144,115 L174,115" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M324,115 L354,115" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M504,115 L534,115" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M684,115 L714,115" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M290,278 L375,278" fill="none" stroke="#555" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
<path d="M525,278 L610,278" fill="none" stroke="#555" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
<text x="450" y="196" font-size="11" fill="#8a4b06" text-anchor="middle">the mesh is the same L7 routing, applied to every internal call — not just at the edge</text>
<text x="450" y="352" font-size="11" fill="#2f6db5" text-anchor="middle">each layer makes a different kind of decision, and each emits a trace span — the journey is observable end to end</text>
</svg>