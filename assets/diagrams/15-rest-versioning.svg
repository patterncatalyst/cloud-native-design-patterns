<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="45" width="270" height="185" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="155.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">URI path</text>
<text x="155.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">/v2/orders</text>
<text x="155.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">visible, trivial to route</text>
<text x="155.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">couples version to URL</text>
<text x="155.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">most widely used</text>
<rect x="300" y="45" width="270" height="185" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="435.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Query param</text>
<text x="435.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">/orders?version=2</text>
<text x="435.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">easy to default</text>
<text x="435.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">muddies caching keys</text>
<text x="435.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">least recommended</text>
<rect x="580" y="45" width="270" height="185" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="715.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Custom header</text>
<text x="715.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">X-API-Version: 2</text>
<text x="715.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">URL stays clean</text>
<text x="715.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">invisible, easy to miss</text>
<text x="715.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">needs discipline</text>
<rect x="860" y="45" width="270" height="185" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="995.0" y="113.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Media type</text>
<text x="995.0" y="130.0" font-size="11.5" fill="#555555" text-anchor="middle">Accept: …order.v2+json</text>
<text x="995.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">content negotiation</text>
<text x="995.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">URL identifies resource</text>
<text x="995.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">the RESTful way</text>
<text x="590" y="275" font-size="12" fill="#2f6db5" text-anchor="middle">URI versioning is the most common; media-type versioning keeps URLs stable and is the more RESTful choice</text>
</svg>