<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 392" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="70" width="260" height="86" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="170.0" y="103.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">NETWORK</text>
<text x="170.0" y="120.5" font-size="11.5" fill="#555555" text-anchor="middle">partition · split-brain</text>
<text x="170.0" y="135.5" font-size="11.5" fill="#555555" text-anchor="middle">alive but cannot talk</text>
<rect x="320" y="70" width="260" height="86" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="450.0" y="103.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">COMPONENT</text>
<text x="450.0" y="120.5" font-size="11.5" fill="#555555" text-anchor="middle">partial · gray failure</text>
<text x="450.0" y="135.5" font-size="11.5" fill="#555555" text-anchor="middle">some fail; some lie</text>
<rect x="600" y="70" width="260" height="86" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="730.0" y="103.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">LOAD</text>
<text x="730.0" y="120.5" font-size="11.5" fill="#555555" text-anchor="middle">amplification · cascading</text>
<text x="730.0" y="135.5" font-size="11.5" fill="#555555" text-anchor="middle">a failure feeds on itself</text>
<rect x="330" y="196" width="240" height="52" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="450.0" y="227.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Distributed system</text>
<rect x="40" y="288" width="820" height="74" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="450.0" y="315.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">The defensive toolkit (the rest of this appendix)</text>
<text x="450.0" y="332.5" font-size="11.5" fill="#555555" text-anchor="middle">timeouts+deadlines · retry w/ backoff+jitter · circuit breakers · bulkheads (§12)</text>
<text x="450.0" y="347.5" font-size="11.5" fill="#555555" text-anchor="middle">load shedding · fallback · quorum/consensus · Istio · graceful shutdown (App. H) · observability (§11)</text>
<path d="M170,156 L410,196" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M450,156 L450,196" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M730,156 L490,196" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M450,248 L450,288" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="450" y="378" font-size="11" fill="#2f6db5" text-anchor="middle">all management is risk management — you manage the distribution of failures, not their existence</text>
