<rect x="250" y="70" width="300" height="210" rx="12" fill="#f3f3f3" stroke="#ddd"/>
<text x="262" y="90" font-size="12" font-weight="700" fill="#1d1d1d">Database (Postgres / MySQL / SQL Server)</text>
<rect x="20" y="120" width="175" height="95" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="107.5" y="158.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Application</text>
<text x="107.5" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">INSERT / UPDATE</text>
<text x="107.5" y="190.0" font-size="11.5" fill="#555555" text-anchor="middle">ordinary SQL</text>
<rect x="280" y="110" width="240" height="60" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="400.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Tables / rows</text>
