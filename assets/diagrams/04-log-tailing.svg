<path d="M400,170 L400,195" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="406.0" y="178.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">commit</text>
<text x="406.0" y="178.5" font-size="11" fill="#555" text-anchor="middle">commit</text>
<path d="M520,228 L620,190" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="576.0" y="201.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">tail</text>
<text x="576.0" y="201.0" font-size="11" fill="#555" text-anchor="middle">tail</text>
<path d="M835,175 L905,107" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M835,190 L905,187" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M835,205 L905,267" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="580" y="320" font-size="12" fill="#2f6db5" text-anchor="middle">app writes ordinary SQL; the commit is the only truth and every downstream event is a consequence of it</text>
<text x="580" y="344" font-size="11" fill="#8a4b06" text-anchor="middle">no dual-write, no app-side broker call · Debezium runs as a Kafka Connect connector (Apache 2.0)</text>
</svg>