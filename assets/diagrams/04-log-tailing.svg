<text x="400.0" y="227.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Write-ahead log (WAL)</text>
<text x="400.0" y="244.0" font-size="11.5" fill="#555555" text-anchor="middle">commit-ordered, durable</text>
<rect x="620" y="130" width="215" height="120" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="727.5" y="173.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Debezium connector</text>
