<text x="1020.0" y="112.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Kafka · orders.public</text>
<rect x="905" y="160" width="230" height="54" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="1020.0" y="192.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Kafka · orders.outbox</text>
<rect x="905" y="240" width="230" height="54" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="1020.0" y="272.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Kafka · …</text>
