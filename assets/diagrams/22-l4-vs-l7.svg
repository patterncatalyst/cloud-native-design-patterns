<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 400" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="70" width="520" height="285" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="300.0" y="143.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">L4 (transport)</text>
<text x="300.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">source / destination IP</text>
<text x="300.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">source / destination port</text>
<text x="300.0" y="190.0" font-size="11.5" fill="#555555" text-anchor="middle">TCP / UDP protocol</text>
<text x="300.0" y="205.0" font-size="11.5" fill="#555555" text-anchor="middle">TLS SNI (hostname only)</text>
<text x="300.0" y="220.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="300.0" y="235.0" font-size="11.5" fill="#555555" text-anchor="middle">decisions it can make:</text>
<text x="300.0" y="250.0" font-size="11.5" fill="#555555" text-anchor="middle">pick a backend by IP / port</text>
<text x="300.0" y="265.0" font-size="11.5" fill="#555555" text-anchor="middle">load-balance by 5-tuple</text>
<text x="300.0" y="280.0" font-size="11.5" fill="#555555" text-anchor="middle">cannot read URLs or headers</text>
<text x="300.0" y="295.0" font-size="11.5" fill="#555555" text-anchor="middle">cannot route per user / cookie</text>
<rect x="620" y="70" width="520" height="285" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="880.0" y="143.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">L7 (application)</text>
<text x="880.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">host header · URL path</text>
<text x="880.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">HTTP method · query params</text>
<text x="880.0" y="190.0" font-size="11.5" fill="#555555" text-anchor="middle">request / response headers</text>
<text x="880.0" y="205.0" font-size="11.5" fill="#555555" text-anchor="middle">cookies · JWT claims · gRPC service.method</text>
<text x="880.0" y="220.0" font-size="11.5" fill="#555555" text-anchor="middle">TLS SNI · body (use sparingly)</text>
<text x="880.0" y="235.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="880.0" y="250.0" font-size="11.5" fill="#555555" text-anchor="middle">decisions it can make:</text>
<text x="880.0" y="265.0" font-size="11.5" fill="#555555" text-anchor="middle">path / header / cookie → backend</text>
<text x="880.0" y="280.0" font-size="11.5" fill="#555555" text-anchor="middle">header → canary, version, user</text>
<text x="880.0" y="295.0" font-size="11.5" fill="#555555" text-anchor="middle">inject / rewrite headers; rate-limit</text>
<text x="590" y="385" font-size="12" fill="#2f6db5" text-anchor="middle">L7 routers can act on anything in the HTTP/gRPC envelope — paths, headers, methods, even gRPC service.method</text>
</svg>