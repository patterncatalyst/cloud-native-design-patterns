<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="228" width="200" height="80" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="140.0" y="266.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">orders topic</text>
<text x="140.0" y="283.0" font-size="11.5" fill="#555555" text-anchor="middle">main partition</text>
<rect x="300" y="228" width="180" height="80" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="390.0" y="266.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">consumer</text>
<text x="390.0" y="283.0" font-size="11.5" fill="#555555" text-anchor="middle">process record</text>
<rect x="540" y="108" width="220" height="80" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="650.0" y="146.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">ack + commit</text>
<text x="650.0" y="163.0" font-size="11.5" fill="#555555" text-anchor="middle">happy path</text>
<rect x="540" y="230" width="210" height="78" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="645.0" y="267.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">retry.5s</text>
<text x="645.0" y="284.0" font-size="11.5" fill="#555555" text-anchor="middle">delayed retry</text>
<rect x="800" y="230" width="210" height="78" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="905.0" y="267.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">retry.30s</text>
<text x="905.0" y="284.0" font-size="11.5" fill="#555555" text-anchor="middle">longer delay</text>
<rect x="800" y="378" width="210" height="88" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="905.0" y="412.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">orders.DLQ</text>
<text x="905.0" y="429.5" font-size="11.5" fill="#555555" text-anchor="middle">dead-letter</text>
<text x="905.0" y="444.5" font-size="11.5" fill="#555555" text-anchor="middle">alert / tooling</text>
<rect x="300" y="378" width="400" height="88" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="500.0" y="412.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">offset committed either way</text>
<text x="500.0" y="429.5" font-size="11.5" fill="#555555" text-anchor="middle">a poison record never blocks</text>
<text x="500.0" y="444.5" font-size="11.5" fill="#555555" text-anchor="middle">head-of-line processing</text>
<path d="M240,268 L300,268" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M480,255 L540,160" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="516.0" y="201.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">ok</text>
<text x="516.0" y="201.5" font-size="11" fill="#b8650a" text-anchor="middle">ok</text>
<path d="M480,272 L540,269" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="516.0" y="264.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">fail</text>
<text x="516.0" y="264.5" font-size="11" fill="#b8650a" text-anchor="middle">fail</text>
<path d="M750,269 L800,269" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M905,308 L905,378" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<text x="975.0" y="337.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">after N tries</text>
<text x="975.0" y="337.0" font-size="11" fill="#b8650a" text-anchor="middle">after N tries</text>
<path d="M390,308 L450,378" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="590" y="500" font-size="12" fill="#2f6db5" text-anchor="middle">commit the offset, route the failed record to delayed-retry topics, then to a DLQ after N attempts — the main stream never stalls</text>
</svg>