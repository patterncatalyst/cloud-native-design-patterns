<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 430" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="70" width="450" height="58" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="265.0" y="104.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">INVALID_ARGUMENT · NOT_FOUND — client bug, don&#x27;t retry</text>
<rect x="40" y="138" width="450" height="58" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="265.0" y="172.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">FAILED_PRECONDITION · ALREADY_EXISTS — state, don&#x27;t retry</text>
<rect x="40" y="206" width="450" height="58" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="265.0" y="240.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">UNAVAILABLE · ABORTED — transient, retry with backoff</text>
<rect x="40" y="274" width="450" height="58" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="265.0" y="308.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">RESOURCE_EXHAUSTED — honour the RetryInfo delay</text>
<rect x="40" y="342" width="450" height="58" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="265.0" y="376.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">DEADLINE_EXCEEDED — tune the timeout; maybe retry</text>
<rect x="560" y="80" width="580" height="300" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="850.0" y="183.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">google.rpc.Status (in trailers)</text>
<text x="850.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="850.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">code: UNAVAILABLE (14)</text>
<text x="850.0" y="230.0" font-size="11.5" fill="#555555" text-anchor="middle">message: inventory temporarily down</text>
<text x="850.0" y="245.0" font-size="11.5" fill="#555555" text-anchor="middle">details:</text>
<text x="850.0" y="260.0" font-size="11.5" fill="#555555" text-anchor="middle">  ErrorInfo(reason = STOCK_DOWN,</text>
<text x="850.0" y="275.0" font-size="11.5" fill="#555555" text-anchor="middle">                  domain = inventory)</text>
<text x="850.0" y="290.0" font-size="11.5" fill="#555555" text-anchor="middle">  RetryInfo(retry_delay = 2s)</text>
<text x="265" y="58" font-size="12" fill="#2f6db5" text-anchor="middle" font-weight="700">Common status codes</text>
<text x="590" y="418" font-size="12" fill="#2f6db5" text-anchor="middle">map each failure to the right code, and attach google.rpc.Status details with RetryInfo so clients back off correctly</text>
</svg>