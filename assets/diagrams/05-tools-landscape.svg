<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 430" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="80" width="300" height="140" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="180.0" y="125.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Kafka</text>
<text x="180.0" y="142.5" font-size="11.5" fill="#555555" text-anchor="middle">partitioned, ordered log</text>
<text x="180.0" y="157.5" font-size="11.5" fill="#555555" text-anchor="middle">consumer groups, offsets</text>
<text x="180.0" y="172.5" font-size="11.5" fill="#555555" text-anchor="middle">retention by time/size</text>
<text x="180.0" y="187.5" font-size="11.5" fill="#555555" text-anchor="middle">the de facto event spine</text>
<rect x="30" y="240" width="300" height="120" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="180.0" y="275.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Pulsar</text>
<text x="180.0" y="292.5" font-size="11.5" fill="#555555" text-anchor="middle">pub/sub + queue + log</text>
<text x="180.0" y="307.5" font-size="11.5" fill="#555555" text-anchor="middle">tiered storage, per-tenant</text>
<text x="180.0" y="322.5" font-size="11.5" fill="#555555" text-anchor="middle">geo-replication built in</text>
<text x="180.0" y="337.5" font-size="11.5" fill="#555555" text-anchor="middle">Kafka-protocol shim</text>
<rect x="370" y="80" width="300" height="280" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="520.0" y="165.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Flink</text>
<text x="520.0" y="182.5" font-size="11.5" fill="#555555" text-anchor="middle">stream processing engine</text>
<text x="520.0" y="197.5" font-size="11.5" fill="#555555" text-anchor="middle">windowed aggregations</text>
<text x="520.0" y="212.5" font-size="11.5" fill="#555555" text-anchor="middle">exactly-once w/ checkpointing</text>
<text x="520.0" y="227.5" font-size="11.5" fill="#555555" text-anchor="middle">stateful operators</text>
<text x="520.0" y="242.5" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="520.0" y="257.5" font-size="11.5" fill="#555555" text-anchor="middle">sits on Kafka / Pulsar</text>
<text x="520.0" y="272.5" font-size="11.5" fill="#555555" text-anchor="middle">alts: Kafka Streams (JVM),</text>
<text x="520.0" y="287.5" font-size="11.5" fill="#555555" text-anchor="middle">Spark Structured Streaming</text>
<rect x="710" y="80" width="300" height="140" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="860.0" y="133.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">NiFi</text>
<text x="860.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">visual dataflow / ETL</text>
<text x="860.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">200+ source/sink connectors</text>
<text x="860.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">back-pressure, flow lineage</text>
<rect x="710" y="240" width="300" height="120" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="860.0" y="283.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Debezium</text>
<text x="860.0" y="300.0" font-size="11.5" fill="#555555" text-anchor="middle">CDC: Postgres, MySQL,</text>
<text x="860.0" y="315.0" font-size="11.5" fill="#555555" text-anchor="middle">SQL Server, MongoDB</text>
<text x="860.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">tails the DB commit log</text>
<path d="M330,150 L370,170" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M330,300 L370,250" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M670,170 L710,150" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M670,250 L710,300" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="180" y="48" font-size="13" fill="#8a4b06" text-anchor="middle" font-weight="700">SUBSTRATE — the durable log</text>
<text x="520" y="48" font-size="13" fill="#6a1b9a" text-anchor="middle" font-weight="700">COMPUTE — transform &amp; aggregate</text>
<text x="860" y="48" font-size="13" fill="#006e6e" text-anchor="middle" font-weight="700">MOVEMENT — data in &amp; out</text>
<text x="520" y="402" font-size="12" fill="#2f6db5" text-anchor="middle">typical pipeline: source DB → Debezium/NiFi → Kafka/Pulsar → Flink (windowed) → sink. These tools complement more than they compete (all Apache 2.0).</text>
</svg>