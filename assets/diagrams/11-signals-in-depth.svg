<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="70" width="216" height="215" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="128.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Traces</text>
<text x="128.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">request flow across services</text>
<text x="128.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">latency per span</text>
<text x="128.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">&quot;WHERE did time go?&quot;</text>
<text x="128.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">Tempo / Jaeger</text>
<rect x="256" y="70" width="216" height="215" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="364.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Metrics</text>
<text x="364.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">aggregate rates, errors,</text>
<text x="364.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">latencies (RED / USE)</text>
<text x="364.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">&quot;what&#x27;s the trend?&quot;</text>
<text x="364.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">Prometheus / Mimir</text>
<rect x="492" y="70" width="216" height="215" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="600.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Logs</text>
<text x="600.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">discrete, timestamped events</text>
<text x="600.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">from one component</text>
<text x="600.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">&quot;what EXACTLY happened?&quot;</text>
<text x="600.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">Loki / ELK</text>
<rect x="728" y="70" width="216" height="215" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="836.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Baggage</text>
<text x="836.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">key-value context</text>
<text x="836.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">carried ALONG the trace</text>
<text x="836.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">&quot;tenant_id downstream&quot;</text>
<text x="836.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">(W3C Baggage)</text>
<rect x="964" y="70" width="216" height="215" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="1072.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Profiles</text>
<text x="1072.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">continuous CPU / mem</text>
<text x="1072.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">sampling per service</text>
<text x="1072.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">&quot;which FUNCTION burns CPU?&quot;</text>
<text x="1072.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">Pyroscope / Parca</text>
<rect x="20" y="315" width="1160" height="50" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="600.0" y="345.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">correlated by trace_id + span_id + resource attributes (service.name, k8s.pod, deployment.version)</text>
<text x="600" y="405" font-size="12" fill="#2f6db5" text-anchor="middle">OpenTelemetry is one vendor-neutral SDK for all five — the trace_id lets you pivot: metric spike → exemplar trace → its logs → its CPU profile</text>
</svg>