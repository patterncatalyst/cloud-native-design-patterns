<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 360" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="55" width="520" height="225" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="300.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Safe — wire compatible</text>
<text x="300.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">add a field with a new number</text>
<text x="300.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">add a new rpc method</text>
<text x="300.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">add a value to an enum</text>
<text x="300.0" y="190.0" font-size="11.5" fill="#555555" text-anchor="middle">rename a field (number unchanged)</text>
<text x="300.0" y="205.0" font-size="11.5" fill="#555555" text-anchor="middle">deprecate with [deprecated=true]</text>
<text x="300.0" y="220.0" font-size="11.5" fill="#555555" text-anchor="middle">widen with reserved for old tags</text>
<rect x="620" y="55" width="520" height="225" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="880.0" y="128.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Breaking — rejected by the gate</text>
<text x="880.0" y="145.0" font-size="11.5" fill="#555555" text-anchor="middle">change a field&#x27;s number or type</text>
<text x="880.0" y="160.0" font-size="11.5" fill="#555555" text-anchor="middle">reuse a removed field number</text>
<text x="880.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">remove a field without reserved</text>
<text x="880.0" y="190.0" font-size="11.5" fill="#555555" text-anchor="middle">change unary ↔ streaming on an rpc</text>
<text x="880.0" y="205.0" font-size="11.5" fill="#555555" text-anchor="middle">rename or move a service / package</text>
<text x="880.0" y="220.0" font-size="11.5" fill="#555555" text-anchor="middle">change request / response message type</text>
<text x="590" y="305" font-size="12" fill="#8a4b06" text-anchor="middle">switching a method between unary, server-stream, client-stream or bidi changes the HTTP/2 framing — always breaking</text>
<text x="590" y="338" font-size="12" fill="#2f6db5" text-anchor="middle">wire compatibility is governed by field numbers and types; never reuse or renumber a field</text>
</svg>