<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="430" y="50" width="320" height="80" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="590.0" y="88.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">orchestrator</text>
<text x="590.0" y="105.0" font-size="11.5" fill="#555555" text-anchor="middle">owns the saga context</text>
<rect x="60" y="205" width="300" height="92" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="210.0" y="241.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">service A</text>
<text x="210.0" y="258.5" font-size="11.5" fill="#555555" text-anchor="middle">returns reservation_id</text>
<text x="210.0" y="273.5" font-size="11.5" fill="#555555" text-anchor="middle">+ warehouse region</text>
<rect x="820" y="205" width="300" height="92" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="970.0" y="241.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">service B</text>
<text x="970.0" y="258.5" font-size="11.5" fill="#555555" text-anchor="middle">needs reservation_id</text>
<text x="970.0" y="273.5" font-size="11.5" fill="#555555" text-anchor="middle">from A to proceed</text>
<rect x="370" y="350" width="440" height="92" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="590.0" y="386.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">saga context (persisted)</text>
<text x="590.0" y="403.5" font-size="11.5" fill="#555555" text-anchor="middle">reservation_id=r-77 · region=eu-1</text>
<text x="590.0" y="418.5" font-size="11.5" fill="#555555" text-anchor="middle">written after A, read before B</text>
<rect x="300" y="468" width="580" height="62" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="590.0" y="497.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">crash between 2 and 3?  on restart, load the saga context, see A is</text>
<text x="590.0" y="514.0" font-size="11.5" fill="#555555" text-anchor="middle">done, and resume at step B — no re-call of A, no lost data</text>
<path d="M470,130 L300,205" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="391.0" y="161.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">1. call A</text>
<text x="391.0" y="161.5" font-size="11" fill="#555" text-anchor="middle">1. call A</text>
<path d="M210,297 L450,352" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="336.0" y="318.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">2. persist A&#x27;s output</text>
<text x="336.0" y="318.5" font-size="11" fill="#b8650a" text-anchor="middle">2. persist A&#x27;s output</text>
<path d="M790,390 L900,297" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="851.0" y="337.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">4. supply to B</text>
<text x="851.0" y="337.5" font-size="11" fill="#b8650a" text-anchor="middle">4. supply to B</text>
<path d="M720,130 L920,205" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="826.0" y="161.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">3. call B(ctx)</text>
<text x="826.0" y="161.5" font-size="11" fill="#555" text-anchor="middle">3. call B(ctx)</text>
<text x="590" y="550" font-size="12" fill="#2f6db5" text-anchor="middle">don&#x27;t make B call A — persist A&#x27;s result into the saga context and pass it forward; on resume, read it back</text>
</svg>