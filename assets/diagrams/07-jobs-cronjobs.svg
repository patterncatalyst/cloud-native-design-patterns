<text x="815.0" y="138.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Queue worker</text>
<text x="815.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">long-lived consumer</text>
<text x="815.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">scaled by KEDA</text>
