<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 440" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="200" y="58" width="780" height="232" rx="12" fill="#fdf3e3" stroke="#ddd"/>
<text x="212" y="78" font-size="12" font-weight="700" fill="#1d1d1d">The application — still a single deployable</text>
<rect x="230" y="100" width="230" height="178" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="345.0" y="157.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Orders module</text>
<text x="345.0" y="174.0" font-size="11.5" fill="#555555" text-anchor="middle">public API only</text>
<text x="345.0" y="189.0" font-size="11.5" fill="#555555" text-anchor="middle">PlaceOrder · GetOrder</text>
<text x="345.0" y="204.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="345.0" y="219.0" font-size="11.5" fill="#555555" text-anchor="middle">private internals</text>
<text x="345.0" y="234.0" font-size="11.5" fill="#555555" text-anchor="middle">guarded by build tool</text>
<rect x="480" y="100" width="230" height="178" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="595.0" y="157.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Inventory module</text>
<text x="595.0" y="174.0" font-size="11.5" fill="#555555" text-anchor="middle">public API only</text>
<text x="595.0" y="189.0" font-size="11.5" fill="#555555" text-anchor="middle">ReserveStock</text>
<text x="595.0" y="204.0" font-size="11.5" fill="#555555" text-anchor="middle">CheckAvailability</text>
<text x="595.0" y="219.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="595.0" y="234.0" font-size="11.5" fill="#555555" text-anchor="middle">private internals · no shared types</text>
<rect x="730" y="100" width="230" height="178" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="845.0" y="157.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Payments module</text>
<text x="845.0" y="174.0" font-size="11.5" fill="#555555" text-anchor="middle">public API only</text>
<text x="845.0" y="189.0" font-size="11.5" fill="#555555" text-anchor="middle">ChargeCard · Refund</text>
<text x="845.0" y="204.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="845.0" y="219.0" font-size="11.5" fill="#555555" text-anchor="middle">private internals</text>
<text x="845.0" y="234.0" font-size="11.5" fill="#555555" text-anchor="middle">own data schema</text>
<rect x="380" y="318" width="420" height="74" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="590.0" y="353.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">One database, separate schemas</text>
<text x="590.0" y="370.0" font-size="11.5" fill="#555555" text-anchor="middle">orders.* / inventory.* / payments.*  ·  no cross-schema joins (enforced)</text>
<path d="M590,290 L590,318" fill="none" stroke="#555" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
<text x="590" y="418" font-size="12" fill="#2e7d32" text-anchor="middle">modules talk only through their public API — linters and build rules enforce it, not a gentlemen&#x27;s agreement</text>
</svg>