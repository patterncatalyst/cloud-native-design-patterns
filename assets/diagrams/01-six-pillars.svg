<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="60" width="280" height="175" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="160.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Disposable</text>
<text x="160.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle">12-factor processes</text>
<text x="160.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">fast start / clean stop</text>
<text x="160.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">no local state</text>
<rect x="320" y="60" width="280" height="175" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="460.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Observable</text>
<text x="460.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle">traces · metrics · logs</text>
<text x="460.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">health &amp; readiness</text>
<text x="460.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">RED / USE signals</text>
<rect x="620" y="60" width="280" height="175" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="760.0" y="130.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Resilient</text>
<text x="760.0" y="147.5" font-size="11.5" fill="#555555" text-anchor="middle">timeouts · retries</text>
<text x="760.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">circuit breakers</text>
<text x="760.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">graceful degradation</text>
<rect x="20" y="255" width="280" height="175" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="160.0" y="325.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Elastic</text>
<text x="160.0" y="342.5" font-size="11.5" fill="#555555" text-anchor="middle">scale to load</text>
<text x="160.0" y="357.5" font-size="11.5" fill="#555555" text-anchor="middle">scale to zero (KEDA)</text>
<text x="160.0" y="372.5" font-size="11.5" fill="#555555" text-anchor="middle">no fixed capacity</text>
<rect x="320" y="255" width="280" height="175" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="460.0" y="325.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Automatable</text>
<text x="460.0" y="342.5" font-size="11.5" fill="#555555" text-anchor="middle">declarative config</text>
<text x="460.0" y="357.5" font-size="11.5" fill="#555555" text-anchor="middle">GitOps · CRDs</text>
<text x="460.0" y="372.5" font-size="11.5" fill="#555555" text-anchor="middle">self-healing</text>
<rect x="620" y="255" width="280" height="175" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="760.0" y="325.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Loosely coupled</text>
<text x="760.0" y="342.5" font-size="11.5" fill="#555555" text-anchor="middle">contracts, not calls</text>
<text x="760.0" y="357.5" font-size="11.5" fill="#555555" text-anchor="middle">async where it fits</text>
<text x="760.0" y="372.5" font-size="11.5" fill="#555555" text-anchor="middle">independent deploy</text>
<text x="460" y="455" font-size="12" fill="#2f6db5" text-anchor="middle">cloud-native is a set of runtime properties an API must exhibit to thrive on Kubernetes — not a checklist of tools</text>
</svg>