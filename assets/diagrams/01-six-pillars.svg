<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="372" y="193" width="176" height="86" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="460.0" y="234.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Cloud-native API</text>
<text x="460.0" y="251.0" font-size="11.5" fill="#555555" text-anchor="middle">on Kubernetes</text>
<rect x="28" y="40" width="250" height="104" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="153.0" y="82.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Disposable</text>
<text x="153.0" y="99.5" font-size="11.5" fill="#555555" text-anchor="middle">fast start, clean stop</text>
<text x="153.0" y="114.5" font-size="11.5" fill="#555555" text-anchor="middle">no local state</text>
<rect x="28" y="183" width="250" height="104" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="153.0" y="225.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Resilient</text>
<text x="153.0" y="242.5" font-size="11.5" fill="#555555" text-anchor="middle">timeouts · retries</text>
<text x="153.0" y="257.5" font-size="11.5" fill="#555555" text-anchor="middle">breakers · degrade</text>
<rect x="28" y="326" width="250" height="104" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="153.0" y="368.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Automatable</text>
<text x="153.0" y="385.5" font-size="11.5" fill="#555555" text-anchor="middle">declarative · GitOps</text>
<text x="153.0" y="400.5" font-size="11.5" fill="#555555" text-anchor="middle">CRDs · self-healing</text>
<rect x="642" y="40" width="250" height="104" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="767.0" y="82.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Observable</text>
<text x="767.0" y="99.5" font-size="11.5" fill="#555555" text-anchor="middle">traces · metrics · logs</text>
<text x="767.0" y="114.5" font-size="11.5" fill="#555555" text-anchor="middle">health · RED/USE</text>
<rect x="642" y="183" width="250" height="104" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="767.0" y="225.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Elastic</text>
<text x="767.0" y="242.5" font-size="11.5" fill="#555555" text-anchor="middle">scale to load</text>
<text x="767.0" y="257.5" font-size="11.5" fill="#555555" text-anchor="middle">scale to zero (KEDA)</text>
<rect x="642" y="326" width="250" height="104" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="767.0" y="368.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Loosely coupled</text>
<text x="767.0" y="385.5" font-size="11.5" fill="#555555" text-anchor="middle">contracts, not calls</text>
<text x="767.0" y="400.5" font-size="11.5" fill="#555555" text-anchor="middle">async · independent deploy</text>
<path d="M390,205 L278,92" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M372,236 L278,235" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M390,267 L278,378" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M530,205 L642,92" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M548,236 L642,235" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M530,267 L642,378" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="460" y="456" font-size="12" fill="#2f6db5" text-anchor="middle">cloud-native is a set of runtime properties an API must exhibit to thrive on Kubernetes — not a checklist of tools</text>
</svg>