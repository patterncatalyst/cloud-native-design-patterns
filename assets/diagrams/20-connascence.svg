<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="62" width="300" height="292" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="42" y="82" font-size="12" font-weight="700" fill="#1d1d1d">Static — in the code  (weaker ↑ · stronger ↓)</text>
<rect x="390" y="62" width="300" height="244" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="402" y="82" font-size="12" font-weight="700" fill="#1d1d1d">Dynamic — at runtime  (weaker ↑ · stronger ↓)</text>
<rect x="60" y="98" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="190.0" y="117.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Name</text>
<text x="190.0" y="134.0" font-size="11.5" fill="#555555" text-anchor="middle">agree on an identifier</text>
<rect x="60" y="146" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="190.0" y="165.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Type</text>
<text x="190.0" y="182.0" font-size="11.5" fill="#555555" text-anchor="middle">agree on a type/shape</text>
<rect x="60" y="194" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="190.0" y="213.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Meaning</text>
<text x="190.0" y="230.0" font-size="11.5" fill="#555555" text-anchor="middle">shared convention / magic value</text>
<rect x="60" y="242" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="190.0" y="261.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Position</text>
<text x="190.0" y="278.0" font-size="11.5" fill="#555555" text-anchor="middle">same order of args or fields</text>
<rect x="60" y="290" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="190.0" y="309.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Algorithm</text>
<text x="190.0" y="326.0" font-size="11.5" fill="#555555" text-anchor="middle">same algorithm on both sides</text>
<rect x="420" y="98" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="550.0" y="117.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Execution order</text>
<text x="550.0" y="134.0" font-size="11.5" fill="#555555" text-anchor="middle">A must run before B</text>
<rect x="420" y="146" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="550.0" y="165.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Timing</text>
<text x="550.0" y="182.0" font-size="11.5" fill="#555555" text-anchor="middle">race-sensitive</text>
<rect x="420" y="194" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="550.0" y="213.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Value</text>
<text x="550.0" y="230.0" font-size="11.5" fill="#555555" text-anchor="middle">values must stay in agreement</text>
<rect x="420" y="242" width="260" height="42" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="550.0" y="261.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Identity</text>
<text x="550.0" y="278.0" font-size="11.5" fill="#555555" text-anchor="middle">same instance / entity</text>
<text x="380" y="386" font-size="11" fill="#1d1d1d" text-anchor="middle" font-weight="700">rule: the stronger the connascence between two parts, the more local they must stay</text>
</svg>