<text x="450" y="250" font-size="11" fill="#8a4b06" text-anchor="middle">the mesh gives timeouts, retries, mesh-bulkheads (connectionPool) and gray-failure ejection (outlierDetection) for free — don&#x27;t ALSO retry in the app</text>
