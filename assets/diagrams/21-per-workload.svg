<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 440" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="70" width="280" height="215" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="160.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">HTTP · REST/gRPC</text>
<text x="160.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">stop accepting new</text>
<text x="160.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">finish in-flight requests</text>
<text x="160.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">bounded by a timeout</text>
<text x="160.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">— the one that&#x27;s automatic</text>
<rect x="310" y="70" width="280" height="215" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="450.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Kafka consumer</text>
<text x="450.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">stop polling</text>
<text x="450.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">finish current records</text>
<text x="450.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">commit offsets</text>
<text x="450.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">leave the group</text>
<rect x="600" y="70" width="280" height="215" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="740.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">WebSocket</text>
<text x="740.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">send a close / go-away</text>
<text x="740.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">clients reconnect elsewhere</text>
<text x="740.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">lean on seq + backplane</text>
<text x="740.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">— Appendix C</text>
<rect x="890" y="70" width="280" height="215" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="1030.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Jobs / scheduler</text>
<text x="1030.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">don&#x27;t start new work</text>
<text x="1030.0" y="185.0" font-size="11.5" fill="#555555" text-anchor="middle">let running jobs finish</text>
<text x="1030.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">or checkpoint progress</text>
<text x="1030.0" y="215.0" font-size="11.5" fill="#555555" text-anchor="middle">resume after restart</text>
<rect x="20" y="310" width="1150" height="72" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="595.0" y="344.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">make every handler idempotent</text>
<text x="595.0" y="361.0" font-size="11.5" fill="#555555" text-anchor="middle">a hard SIGKILL is always possible — idempotent work means a redelivered request or message is safe</text>
<text x="590" y="418" font-size="12" fill="#2f6db5" text-anchor="middle">stop taking new work, finish or hand off what&#x27;s in flight, release resources, then exit</text>
</svg>