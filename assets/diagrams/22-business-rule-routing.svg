<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="175" width="200" height="86" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="130.0" y="216.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">inputs</text>
<text x="130.0" y="233.0" font-size="11.5" fill="#555555" text-anchor="middle">REST · WebSocket · Kafka</text>
<rect x="280" y="85" width="560" height="250" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="560.0" y="163.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">FastAPI / Starlette router</text>
<text x="560.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="560.0" y="195.0" font-size="11.5" fill="#555555" text-anchor="middle">@app.post(&quot;/orders/route&quot;)        # front</text>
<text x="560.0" y="210.0" font-size="11.5" fill="#555555" text-anchor="middle">async def route(order, producer):</text>
<text x="560.0" y="225.0" font-size="11.5" fill="#555555" text-anchor="middle">    ctx  = await enrich(order)       # context</text>
<text x="560.0" y="240.0" font-size="11.5" fill="#555555" text-anchor="middle">    fact = post(&quot;orders&quot;, order | ctx)   # ruleset</text>
<text x="560.0" y="255.0" font-size="11.5" fill="#555555" text-anchor="middle">    for dest in fact[&quot;where_to&quot;]:    # dispatch</text>
<text x="560.0" y="270.0" font-size="11.5" fill="#555555" text-anchor="middle">        await producer.send(dest, body)</text>
<rect x="890" y="150" width="250" height="120" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="1015.0" y="193.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">durable-rules</text>
<text x="1015.0" y="210.0" font-size="11.5" fill="#555555" text-anchor="middle">Rete engine in C</text>
<text x="1015.0" y="225.0" font-size="11.5" fill="#555555" text-anchor="middle">Python ruleset DSL</text>
<text x="1015.0" y="240.0" font-size="11.5" fill="#555555" text-anchor="middle">(forward chaining)</text>
<rect x="260" y="405" width="200" height="84" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="360.0" y="445.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">service A</text>
<text x="360.0" y="462.0" font-size="11.5" fill="#555555" text-anchor="middle">kafka:orders</text>
<rect x="490" y="405" width="200" height="84" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="590.0" y="445.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">service B</text>
<text x="590.0" y="462.0" font-size="11.5" fill="#555555" text-anchor="middle">http:payments</text>
<rect x="720" y="405" width="200" height="84" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="820.0" y="445.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">DLQ / audit</text>
<text x="820.0" y="462.0" font-size="11.5" fill="#555555" text-anchor="middle">kafka:errors</text>
<path d="M230,210 L280,210" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M890,210 L840,210" fill="none" stroke="#555" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
<text x="871.0" y="202.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">evaluate</text>
<text x="871.0" y="202.0" font-size="11" fill="#555" text-anchor="middle">evaluate</text>
<path d="M420,335 L360,405" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M560,335 L590,405" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M700,335 L820,405" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="590" y="508" font-size="12" fill="#2f6db5" text-anchor="middle">when &#x27;route by header&#x27; isn&#x27;t enough — when the decision is a business rule — push it into a rule engine inside the service</text>
