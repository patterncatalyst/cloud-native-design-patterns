<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 320" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="370" height="205" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="205.0" y="103.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">REST — resources</text>
<text x="205.0" y="120.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="205.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">nouns + HTTP verbs</text>
<text x="205.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">POST /orders</text>
<text x="205.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">GET /orders/{id}</text>
<text x="205.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">state transfer</text>
<text x="205.0" y="195.0" font-size="11.5" fill="#555555" text-anchor="middle">server defines payload</text>
<rect x="405" y="40" width="370" height="205" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="590.0" y="103.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">gRPC — procedures</text>
<text x="590.0" y="120.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="590.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">typed method calls</text>
<text x="590.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">Order.Place(req)</text>
<text x="590.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">Inventory.Reserve(req)</text>
<text x="590.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">behaviour, not state</text>
<text x="590.0" y="195.0" font-size="11.5" fill="#555555" text-anchor="middle">contract = .proto</text>
<rect x="790" y="40" width="370" height="205" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="975.0" y="103.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">GraphQL — a graph</text>
<text x="975.0" y="120.0" font-size="11.5" fill="#555555" text-anchor="middle"></text>
<text x="975.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">one typed schema</text>
<text x="975.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">query { order { ... } }</text>
<text x="975.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">client picks fields</text>
<text x="975.0" y="180.0" font-size="11.5" fill="#555555" text-anchor="middle">traverse relationships</text>
<text x="975.0" y="195.0" font-size="11.5" fill="#555555" text-anchor="middle">contract = SDL</text>
<text x="205" y="268" font-size="11" fill="#2f6db5" text-anchor="middle" font-weight="700">resource-oriented</text>
<text x="590" y="268" font-size="11" fill="#6b4ea0" text-anchor="middle" font-weight="700">RPC-oriented</text>
<text x="975" y="268" font-size="11" fill="#8a4b06" text-anchor="middle" font-weight="700">query-oriented</text>
<text x="590" y="302" font-size="12" fill="#555" text-anchor="middle">REST models state as resources; gRPC models behaviour as procedures; GraphQL models a typed graph of data</text>
</svg>