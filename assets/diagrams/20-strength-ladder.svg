<text x="850.0" y="203.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">in our system</text>
<text x="850.0" y="220.0" font-size="11.5" fill="#555555" text-anchor="middle">duplicated or co-owned domain logic</text>
