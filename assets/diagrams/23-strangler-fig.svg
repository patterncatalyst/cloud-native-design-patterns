<text x="330.0" y="148.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Proxy</text>
<text x="330.0" y="165.0" font-size="11.5" fill="#555555" text-anchor="middle">routing layer</text>
<rect x="520" y="72" width="250" height="58" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="645.0" y="99.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">New service</text>
