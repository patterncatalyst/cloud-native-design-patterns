<text x="330" y="205" font-size="10" fill="#8a4b06" text-anchor="middle">step zero: add the proxy first</text>
<text x="450" y="300" font-size="11" fill="#2f6db5" text-anchor="middle">redirect is a proxy config change, not a client release — widen to roll forward, narrow to roll back, every step reversible</text>
