<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 326" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="44" width="860" height="232" rx="12" fill="#fbfbfb" stroke="#ddd"/>
<text x="32" y="64" font-size="12" font-weight="700" fill="#1d1d1d">Identify → move → redirect — one bounded asset at a time, system live throughout</text>
