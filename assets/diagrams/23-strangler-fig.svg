<text x="645.0" y="209.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Shrinking monolith</text>
<text x="645.0" y="226.0" font-size="11.5" fill="#555555" text-anchor="middle">everything else</text>
<path d="M164,150 L250,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M410,135 L520,101" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="471.0" y="110.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">widen 1% → 100%</text>
<text x="471.0" y="110.0" font-size="11" fill="#b8650a" text-anchor="middle">widen 1% → 100%</text>
<path d="M410,165 L520,211" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="471.0" y="204.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">default</text>
