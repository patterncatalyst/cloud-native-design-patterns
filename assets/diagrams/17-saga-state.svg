<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 310" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="45" width="270" height="190" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="155.0" y="123.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">In-memory</text>
<text x="155.0" y="140.0" font-size="11.5" fill="#555555" text-anchor="middle">dict / object only</text>
<text x="155.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">lost on pod restart</text>
<text x="155.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">never for real sagas</text>
<rect x="300" y="45" width="270" height="190" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="435.0" y="123.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">DB state machine</text>
<text x="435.0" y="140.0" font-size="11.5" fill="#555555" text-anchor="middle">row per saga instance</text>
<text x="435.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">status + context JSON</text>
<text x="435.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">you own transitions</text>
<rect x="580" y="45" width="270" height="190" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="715.0" y="123.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Event-sourced</text>
<text x="715.0" y="140.0" font-size="11.5" fill="#555555" text-anchor="middle">append step events</text>
<text x="715.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">rebuild by replay</text>
<text x="715.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">full audit history</text>
<rect x="860" y="45" width="270" height="190" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="995.0" y="123.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Workflow engine</text>
<text x="995.0" y="140.0" font-size="11.5" fill="#555555" text-anchor="middle">Temporal / Camunda</text>
<text x="995.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">durable execution</text>
<text x="995.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">retries + timers built in</text>
<text x="590" y="283" font-size="12" fill="#2f6db5" text-anchor="middle">whatever the store, the state transition and the outbound command must commit together, or you get lost or duplicated steps</text>
</svg>