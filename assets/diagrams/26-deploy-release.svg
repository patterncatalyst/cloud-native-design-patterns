<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 230" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="52" width="860" height="108" rx="12" fill="#f5f8fc" stroke="#ddd"/>
<text x="42" y="72" font-size="12" font-weight="700" fill="#1d1d1d">deploy ≠ release — the artifact ships dark; releasing is a runtime flag flip, not a new deploy</text>
<rect x="50" y="90" width="150" height="52" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="125.0" y="114.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Build &amp; deploy</text>
<text x="125.0" y="131.0" font-size="11.5" fill="#555555" text-anchor="middle">flag OFF</text>
<rect x="236" y="90" width="150" height="52" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="311.0" y="114.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Release</text>
<text x="311.0" y="131.0" font-size="11.5" fill="#555555" text-anchor="middle">flag ON · 1%</text>
<rect x="422" y="90" width="150" height="52" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="497.0" y="114.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Ramp</text>
<text x="497.0" y="131.0" font-size="11.5" fill="#555555" text-anchor="middle">widen the %</text>
<rect x="608" y="90" width="150" height="52" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="683.0" y="114.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">GA</text>
<text x="683.0" y="131.0" font-size="11.5" fill="#555555" text-anchor="middle">flag ON · 100%</text>
<rect x="770" y="90" width="110" height="52" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="825.0" y="121.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Retire flag</text>
<path d="M200,116 L236,116" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M386,116 L422,116" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M572,116 L608,116" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M758,116 L770,116" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="460" y="190" font-size="11" fill="#2f6db5" text-anchor="middle">the deploy is a non-event; every release and rollback is a config change, decoupled from shipping code</text>
</svg>