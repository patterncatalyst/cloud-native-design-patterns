<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="92" width="130" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="105.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">attempt 1</text>
<text x="105.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">fail</text>
<rect x="290" y="92" width="130" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="355.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">attempt 2</text>
<text x="355.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">fail</text>
<rect x="540" y="92" width="130" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="605.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">attempt 3</text>
<text x="605.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">ok / give up</text>
<rect x="760" y="92" width="100" height="56" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="810.0" y="125.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">cap: 3</text>
<path d="M170,120 L290,120" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="236.0" y="112.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">~100ms ± jitter</text>
<text x="236.0" y="112.0" font-size="11" fill="#b8650a" text-anchor="middle">~100ms ± jitter</text>
<path d="M420,120 L540,120" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="486.0" y="112.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">~200ms ± jitter</text>
<text x="486.0" y="112.0" font-size="11" fill="#b8650a" text-anchor="middle">~200ms ± jitter</text>
<path d="M670,120 L760,120" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="450" y="178" font-size="11" fill="#333" text-anchor="middle" font-weight="700">exponential backoff (100 → 200 → 400ms) + jitter (de-synchronise clients) + a hard cap + a retry budget</text>
<text x="450" y="202" font-size="11" fill="#8a4b06" text-anchor="middle">idempotent calls only; always paired with a circuit breaker so a clearly-down dependency stops being retried</text>
</svg>