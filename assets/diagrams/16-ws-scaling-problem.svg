<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 470" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="215" width="190" height="92" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="135.0" y="251.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">clients</text>
<text x="135.0" y="268.5" font-size="11.5" fill="#555555" text-anchor="middle">long-lived</text>
<text x="135.0" y="283.5" font-size="11.5" fill="#555555" text-anchor="middle">ws:// connections</text>
<rect x="300" y="222" width="200" height="80" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="400.0" y="260.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Service / LB</text>
<text x="400.0" y="277.0" font-size="11.5" fill="#555555" text-anchor="middle">sticky per conn</text>
<rect x="560" y="120" width="270" height="80" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="695.0" y="158.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">ws-pod-1</text>
<text x="695.0" y="175.0" font-size="11.5" fill="#555555" text-anchor="middle">120 conns</text>
<rect x="560" y="232" width="270" height="80" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="695.0" y="270.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">ws-pod-2</text>
<text x="695.0" y="287.0" font-size="11.5" fill="#555555" text-anchor="middle">118 conns</text>
<rect x="560" y="344" width="270" height="80" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="695.0" y="382.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">ws-pod-3 (new)</text>
<text x="695.0" y="399.0" font-size="11.5" fill="#555555" text-anchor="middle">0 conns</text>
<rect x="870" y="118" width="290" height="86" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="1015.0" y="151.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">scale-up problem</text>
<text x="1015.0" y="168.5" font-size="11.5" fill="#555555" text-anchor="middle">new pod gets no existing</text>
<text x="1015.0" y="183.5" font-size="11.5" fill="#555555" text-anchor="middle">connections — only new ones</text>
<rect x="870" y="340" width="290" height="90" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="1015.0" y="375.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">scale-down / rollout</text>
<text x="1015.0" y="392.5" font-size="11.5" fill="#555555" text-anchor="middle">killing a pod drops every</text>
<text x="1015.0" y="407.5" font-size="11.5" fill="#555555" text-anchor="middle">connection it was holding</text>
<path d="M230,261 L300,261" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M500,255 L560,160" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M500,262 L560,272" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M500,270 L560,384" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M830,160 L870,160" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<path d="M830,384 L870,384" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<text x="590" y="458" font-size="12" fill="#2f6db5" text-anchor="middle">stateless HTTP load-balances per request; a WebSocket pins to a pod, so scaling and rollouts drop connections</text>
</svg>