<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 420" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="70" width="350" height="200" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="215.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">No affinity</text>
<text x="215.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">any pod gets any request</text>
<text x="215.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">load is even</text>
<text x="215.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">client state lives elsewhere</text>
<text x="215.0" y="207.5" font-size="11.5" fill="#555555" text-anchor="middle">— the preferred default</text>
<rect x="415" y="70" width="350" height="200" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="590.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Cookie-based</text>
<text x="590.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">LB sets a session cookie</text>
<text x="590.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">client returns to same pod</text>
<text x="590.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">works behind any L7 LB</text>
<text x="590.0" y="207.5" font-size="11.5" fill="#555555" text-anchor="middle">ties session to pod life</text>
<rect x="790" y="70" width="350" height="200" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="965.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">IP-hash</text>
<text x="965.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">hash client IP → pod</text>
<text x="965.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">no cookies needed</text>
<text x="965.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">NAT / mobile NAT break it</text>
<text x="965.0" y="207.5" font-size="11.5" fill="#555555" text-anchor="middle">load can skew badly</text>
<rect x="40" y="290" width="1100" height="62" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="590.0" y="319.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">the cost of stickiness</text>
<text x="590.0" y="336.0" font-size="11.5" fill="#555555" text-anchor="middle">uneven load · painful pod restarts · broken scale-to-zero · every restart re-balances all sessions</text>
<text x="590" y="392" font-size="12" fill="#2f6db5" text-anchor="middle">prefer stateless behind a JWT; stickiness should be a deliberate choice, not a default</text>
</svg>