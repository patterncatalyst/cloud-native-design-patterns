<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 286" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="110" width="150" height="66" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="115.0" y="141.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Client</text>
<text x="115.0" y="158.0" font-size="11.5" fill="#555555" text-anchor="middle">1 request</text>
<rect x="250" y="110" width="150" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="325.0" y="141.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Gateway</text>
<text x="325.0" y="158.0" font-size="11.5" fill="#555555" text-anchor="middle">retry ×3</text>
<rect x="460" y="110" width="150" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="535.0" y="141.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Service A</text>
<text x="535.0" y="158.0" font-size="11.5" fill="#555555" text-anchor="middle">retry ×3</text>
<rect x="670" y="110" width="190" height="66" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="765.0" y="133.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Service B</text>
<text x="765.0" y="150.5" font-size="11.5" fill="#555555" text-anchor="middle">= 27 requests</text>
<text x="765.0" y="165.5" font-size="11.5" fill="#555555" text-anchor="middle">at the bottom</text>
<path d="M190,143 L250,143" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="226.0" y="135.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">1</text>
<text x="226.0" y="135.0" font-size="11" fill="#555" text-anchor="middle">1</text>
<path d="M400,143 L460,143" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="436.0" y="135.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">3</text>
<text x="436.0" y="135.0" font-size="11" fill="#b8650a" text-anchor="middle">3</text>
<path d="M610,143 L670,143" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="646.0" y="135.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">9 → 27</text>
<text x="646.0" y="135.0" font-size="11" fill="#b8650a" text-anchor="middle">9 → 27</text>
<text x="450" y="212" font-size="11" fill="#a11" text-anchor="middle" font-weight="700">retries multiply across layers (3×3×3) and synchronise into a thundering herd — the system&#x27;s own defence becomes the attack</text>
<text x="450" y="236" font-size="11" fill="#2f6db5" text-anchor="middle">break it: backoff + jitter, a retry budget (cap % of live traffic), retry at exactly ONE layer, and a circuit breaker</text>
</svg>