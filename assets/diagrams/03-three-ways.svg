<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 340" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="60" width="290" height="185" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="165.0" y="135.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">API Gateway</text>
<text x="165.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">routing · auth · rate-limit</text>
<text x="165.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">no business logic</text>
<text x="165.0" y="182.5" font-size="11.5" fill="#555555" text-anchor="middle">Istio ingress</text>
<rect x="95" y="265" width="140" height="34" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="165.0" y="287.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">thin edge</text>
<rect x="345" y="60" width="290" height="185" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="490.0" y="135.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Backend-for-Frontend</text>
<text x="490.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">one BFF per client type</text>
<text x="490.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">client-specific shaping</text>
<text x="490.0" y="182.5" font-size="11.5" fill="#555555" text-anchor="middle">owns aggregation</text>
<rect x="420" y="265" width="140" height="34" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="490.0" y="287.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">client-shaped</text>
<rect x="670" y="60" width="290" height="185" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="815.0" y="135.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">GraphQL federation</text>
<text x="815.0" y="152.5" font-size="11.5" fill="#555555" text-anchor="middle">schema stitched across</text>
<text x="815.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">domains own subgraphs</text>
<text x="815.0" y="182.5" font-size="11.5" fill="#555555" text-anchor="middle">gateway plans query</text>
<rect x="745" y="265" width="140" height="34" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="815.0" y="287.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">read-optimised</text>
<text x="490" y="322" font-size="12" fill="#2f6db5" text-anchor="middle">aggregation moves toward the client as coupling needs loosen — compose at a gateway/BFF, never by chaining calls inside services</text>
</svg>