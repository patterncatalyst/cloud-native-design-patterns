<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="70" y="120" width="200" height="80" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="170.0" y="150.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">CLOSED</text>
<text x="170.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">calls pass through</text>
<text x="170.0" y="182.5" font-size="11.5" fill="#555555" text-anchor="middle">count failures</text>
<rect x="360" y="120" width="200" height="80" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="460.0" y="150.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">OPEN</text>
<text x="460.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">fail fast, don&#x27;t call</text>
<text x="460.0" y="182.5" font-size="11.5" fill="#555555" text-anchor="middle">(protect the dep)</text>
<rect x="650" y="120" width="200" height="80" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="750.0" y="150.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">HALF-OPEN</text>
<text x="750.0" y="167.5" font-size="11.5" fill="#555555" text-anchor="middle">allow a few trial calls</text>
<text x="750.0" y="182.5" font-size="11.5" fill="#555555" text-anchor="middle">watch the result</text>
<path d="M270,160 L360,160" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="321.0" y="150.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">failures &gt; threshold</text>
<text x="321.0" y="150.0" font-size="11" fill="#b8650a" text-anchor="middle">failures &gt; threshold</text>
<path d="M560,160 L650,160" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="611.0" y="150.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">after reset timeout</text>
<text x="611.0" y="150.0" font-size="11" fill="#555" text-anchor="middle">after reset timeout</text>
<path d="M650,190 L560,190" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="611.0" y="208.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">trial fails → OPEN</text>
<text x="611.0" y="208.0" font-size="11" fill="#b8650a" text-anchor="middle">trial fails → OPEN</text>
<path d="M750,120 L170,120" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="466.0" y="110.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">trial succeeds → CLOSED (recovered)</text>
<text x="466.0" y="110.0" font-size="11" fill="#555" text-anchor="middle">trial succeeds → CLOSED (recovered)</text>
<text x="450" y="270" font-size="11" fill="#2f6db5" text-anchor="middle">one breaker per dependency, never one global · pair with a fallback so an open breaker degrades gracefully instead of just erroring faster</text>
</svg>