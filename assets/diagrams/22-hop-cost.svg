<text x="1015.0" y="237.5" font-size="11.5" fill="#555555" text-anchor="middle">stay under ~10 ms total</text>
<text x="1015.0" y="252.5" font-size="11.5" fill="#555555" text-anchor="middle">L7 on hot paths</text>
