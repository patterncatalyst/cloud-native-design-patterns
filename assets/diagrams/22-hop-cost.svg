<text x="1015.0" y="297.5" font-size="11.5" fill="#555555" text-anchor="middle">earn its place</text>
<text x="450" y="510" font-size="12" fill="#2f6db5" text-anchor="middle">the budget is finite — two layers can be cheap; four layers of overlap is where p99 goes to die</text>
