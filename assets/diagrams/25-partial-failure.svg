<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="118" width="170" height="70" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="125.0" y="143.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Order service</text>
<text x="125.0" y="160.5" font-size="11.5" fill="#555555" text-anchor="middle">one decision</text>
<text x="125.0" y="175.5" font-size="11.5" fill="#555555" text-anchor="middle">per dependency</text>
<rect x="620" y="58" width="240" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="740.0" y="84.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Inventory — healthy</text>
<text x="740.0" y="101.0" font-size="11.5" fill="#555555" text-anchor="middle">use the result</text>
<rect x="620" y="128" width="240" height="56" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="740.0" y="154.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Payment — down</text>
<text x="740.0" y="171.0" font-size="11.5" fill="#555555" text-anchor="middle">fall back / fail</text>
<rect x="620" y="198" width="240" height="56" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="740.0" y="224.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Shipping — slow</text>
<text x="740.0" y="241.0" font-size="11.5" fill="#555555" text-anchor="middle">time out, fall back</text>
<path d="M210,140 L620,86" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M210,153 L620,156" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M210,166 L620,226" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="450" y="284" font-size="11" fill="#8a4b06" text-anchor="middle">the monolith-to-microservices trap: treating a remote call like a local one — no timeout, no fallback — hangs the caller</text>
</svg>