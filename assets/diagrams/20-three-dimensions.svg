<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 430" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="75" width="350" height="175" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="215.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Integration strength</text>
<text x="215.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">how much knowledge</text>
<text x="215.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">two parts share</text>
<text x="215.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">intrusive … contract</text>
<rect x="415" y="75" width="350" height="175" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="590.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Distance</text>
<text x="590.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">how far apart they sit</text>
<text x="590.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">method → class → module</text>
<text x="590.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">→ service → system</text>
<rect x="790" y="75" width="350" height="175" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="965.0" y="145.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Volatility</text>
<text x="965.0" y="162.5" font-size="11.5" fill="#555555" text-anchor="middle">how often the</text>
<text x="965.0" y="177.5" font-size="11.5" fill="#555555" text-anchor="middle">coupled part changes</text>
<text x="965.0" y="192.5" font-size="11.5" fill="#555555" text-anchor="middle">core vs generic subdomain</text>
<rect x="40" y="285" width="1100" height="78" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="590.0" y="322.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">cost of a coupling</text>
<text x="590.0" y="339.0" font-size="11.5" fill="#555555" text-anchor="middle">strong + distant = global complexity (a distributed monolith) — but it only bites when the code is volatile</text>
<text x="402" y="168" font-size="18" fill="#888" text-anchor="middle" font-weight="700">×</text>
<text x="777" y="168" font-size="18" fill="#888" text-anchor="middle" font-weight="700">×</text>
<text x="590" y="410" font-size="12" fill="#2f6db5" text-anchor="middle">a coupling only hurts when shared knowledge, distance, and volatility are all high at once</text>
</svg>