<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="40" y="64" width="330" height="40" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="205.0" y="89.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Distributed monolith — deploy together</text>
<rect x="40" y="118" width="330" height="40" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="205.0" y="143.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Shared database — two services, one table</text>
<rect x="40" y="172" width="330" height="40" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="205.0" y="197.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Chatty call chains — deep sync hops</text>
<rect x="40" y="226" width="330" height="40" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="205.0" y="251.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">No contract · leaky internal models</text>
<rect x="40" y="280" width="330" height="40" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="205.0" y="305.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Missing observability · retry storms</text>
<rect x="456" y="64" width="330" height="40" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="621.0" y="89.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Deploy together? It is one service</text>
<rect x="456" y="118" width="330" height="40" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="621.0" y="143.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">One writer per dataset; others read</text>
<rect x="456" y="172" width="330" height="40" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="621.0" y="197.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Compose at the edge; &lt;= 1 hop</text>
<rect x="456" y="226" width="330" height="40" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="621.0" y="251.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">No contract in registry, no merge</text>
<rect x="456" y="280" width="330" height="40" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="621.0" y="305.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Cannot trace it = cannot run it; bound retries</text>
<path d="M370,84 L456,84" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M370,138 L456,138" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M370,192 L456,192" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M370,246 L456,246" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M370,300 L456,300" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="205" y="42" font-size="11" fill="#1d1d1d" text-anchor="middle">anti-pattern — coupling sneaking back in</text>
<text x="621" y="42" font-size="11" fill="#1d1d1d" text-anchor="middle">the PR-review test that catches it</text>
</svg>