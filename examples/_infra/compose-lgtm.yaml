services:
  lgtm:
    image: docker.io/grafana/otel-lgtm:0.8.1
    container_name: cndp-lgtm
    ports:
      - "3000:3000"
      - "4318:4318"
      - "9090:9090"
      - "3100:3100"
      - "3200:3200"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./otelcol/config.yaml:/otel-lgtm/otelcol-config.yaml:Z
      - ./grafana/datasources.yaml:/otel-lgtm/grafana/conf/provisioning/datasources/datasources.yaml:Z
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

networks:
  default:
    name: cndp
