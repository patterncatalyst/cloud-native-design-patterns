services:
  backend:
    build:
      context: backend-service
    container_name: cndp-backend
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  edge:
    build:
      context: edge-service
    container_name: cndp-edge
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:8081
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
