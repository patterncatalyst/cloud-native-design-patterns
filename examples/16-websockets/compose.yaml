include:
  - path: ../_infra/compose-lgtm.yaml
  - path: ../_infra/compose-redis.yaml

services:
  ws-pod-1:
    build:
      context: ws-server
    container_name: cndp-ws-pod-1
    depends_on:
      redis:
        condition: service_healthy
      lgtm:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
      - POD_NAME=ws-pod-1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  ws-pod-2:
    build:
      context: ws-server
    container_name: cndp-ws-pod-2
    depends_on:
      redis:
        condition: service_healthy
      lgtm:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
      - POD_NAME=ws-pod-2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
