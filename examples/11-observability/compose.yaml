include:
  - path: ../_infra/compose-lgtm.yaml
  - path: ../_infra/compose-postgres.yaml
  - path: ../_infra/compose-kafka.yaml

services:
  postgres:
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:Z

  inventory:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: cndp-inventory
    depends_on:
      lgtm:
        condition: service_healthy
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
      - INITIAL_STOCK=100

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: cndp-order-service
    depends_on:
      lgtm:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      inventory:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://appuser:apppass@postgres:5432/appdb
      - KAFKA_BOOTSTRAP=kafka:9094
      - INVENTORY_ADDR=inventory:50051
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  notification-consumer:
    build:
      context: notification-consumer
    container_name: cndp-notification
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      lgtm:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://appuser:apppass@postgres:5432/appdb
      - KAFKA_BOOTSTRAP=kafka:9094
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
