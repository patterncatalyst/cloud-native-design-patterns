include:
  - path: ../_infra/compose-postgres.yaml
  - path: ../_infra/compose-redis.yaml

services:
  postgres:
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:Z

  cache-service:
    build:
      context: cache-service
    container_name: cndp-cache-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://appuser:apppass@postgres:5432/appdb
      - REDIS_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
